[alembic]
script_location = alembic
prepend_sys_path = .
# Overridden at runtime by alembic/env.py from the DATABASE_URL env var — this placeholder
# carries NO real credentials and is never used to connect.
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/ethara_hrms

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
